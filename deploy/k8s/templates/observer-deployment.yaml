apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shortlink.componentName" (dict "root" . "component" "observer") }}
  labels:
    {{- include "shortlink.componentLabels" (dict "root" . "component" "observer") | nindent 4 }}
spec:
  # Observer state lives in memory -- a second replica would split the
  # event/log/stat aggregation. Keep at 1; horizontal scaling is a v2 concern.
  replicas: {{ .Values.observer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: observer
  template:
    metadata:
      labels:
        {{- include "shortlink.componentLabels" (dict "root" . "component" "observer") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: observer
          image: {{ include "shortlink.image" (dict "Values" .Values "name" "observer") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "shortlink.componentName" (dict "root" . "component" "config") }}
            - secretRef:
                name: {{ include "shortlink.componentName" (dict "root" . "component" "secrets") }}
          env:
            - name: OBSERVER_PORT
              value: "9090"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            {{- toYaml .Values.observer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "shortlink.componentName" (dict "root" . "component" "observer") }}
  labels:
    {{- include "shortlink.componentLabels" (dict "root" . "component" "observer") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: observer
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
