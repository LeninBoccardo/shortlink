# ShortLink Helm values (SPEC §12 / §14). Override locally with --set or -f.

image:
  # Repository prefix shared by every binary; runtime image = repo + "-" + name.
  # api -> shortlink-api, worker -> shortlink-worker, etc.
  repository: shortlink
  tag: dev
  pullPolicy: IfNotPresent
  # `kind load docker-image shortlink-api:dev` puts the image directly into the
  # kind cluster, no registry needed. If you push to a registry, prefix the
  # repository here ("ghcr.io/user/shortlink").

# Per-service replica counts. Worker is also driven by the KEDA ScaledObject
# below -- this value is the minReplicas floor.
api:
  replicas: 2
  resources:
    requests:  { cpu: 100m, memory: 128Mi }
    limits:    { cpu: 500m, memory: 256Mi }

worker:
  replicas: 2
  resources:
    requests:  { cpu: 100m, memory: 128Mi }
    limits:    { cpu: 500m, memory: 256Mi }

observer:
  replicas: 1
  resources:
    requests:  { cpu: 50m,  memory: 64Mi }
    limits:    { cpu: 200m, memory: 128Mi }

# Loadtest: the operator panel + vegeta attack engine (SPEC §4.4). Single
# replica by design — it's an ops tool, not a serving tier. The PVC keeps
# config/keys.yaml durable across pod restarts so an operator who
# generated keys via the UI doesn't lose them on a rollout.
loadtest:
  replicas: 1
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 300m, memory: 256Mi }
  # observerPublicURL + grafanaPublicURL get baked into the showcase
  # page as the browser-facing endpoints. Defaults assume the local
  # workflow of `kubectl port-forward svc/...-loadtest 8090:8090` +
  # `kubectl port-forward svc/...-observer 9090:9090`, which makes the
  # observer reachable at localhost:9090 from the browser. If you put
  # the page behind an Ingress, set these to the public hostnames.
  observerPublicURL: "http://localhost:9090"
  grafanaPublicURL: "http://localhost:3000"
  persistence:
    enabled: true
    size: 10Mi
    # storageClassName empty → use the cluster default. Override for a
    # specific class on managed clusters (gp3, premium-rwo, etc.).
    storageClassName: ""

pgbouncer:
  image:
    repository: edoburu/pgbouncer
    tag: v1.25.1-p0
  replicas: 1
  resources:
    requests:  { cpu: 50m,  memory: 32Mi }
    limits:    { cpu: 200m, memory: 64Mi }

# Where to find the external dependencies. In k8s these would normally be the
# Service names of Postgres / Redis / MinIO deployed alongside this chart, or
# DNS names of cloud-managed equivalents. For the demo cluster they default to
# in-cluster Services that an operator brings up separately.
postgres:
  host: postgres
  port: 5432
  database: shortlink
  user: shortlink

redis:
  url: redis://redis:6379

minio:
  endpoint: minio:9000
  bucket: shortlink-qr
  useSSL: false

# Sensitive values rendered into the Secret. In real deployments these come
# from External Secrets Operator / SealedSecrets / Vault, never plain values.
secrets:
  postgresPassword: shortlink
  minioAccessKey: minioadmin
  minioSecretKey: minioadmin
  # REQUIRED. Empty/missing would leave POST /ingest open in-cluster, so
  # secret.yaml renders it through `required` and helm install will fail
  # until you provide a value (e.g. --set secrets.observerIngestToken=...)
  observerIngestToken: ""

# Non-secret config, rendered into the ConfigMap.
config:
  logLevel: info
  shortURLBase: http://shortlink.example.com
  apiPgPoolSize: 8
  workerPgPoolSize: 4
  signedURLTTL: 60s
  qrSize: 256
  slugLength: 7
  slugMaxRetries: 5
  workerConcurrency: 3
  claimLease: 2m
  webhookMaxAttempts: 5
  drainTimeout: 30s
  sweepStaleAge: 30m
  qrObjectTTL: 15m
  rateLimitFree: 10
  rateLimitPro: 60
  lastUsedThrottle: 5m
  queueDepthThreshold: 100
  ssrfAllowlist: ""   # comma-separated; empty = production-strict
  # urlBlocklist gates the host of every URL submitted to /shorten. Empty
  # means anyone with any tier key can shorten arbitrary http(s) URLs —
  # standard shortener tradeoff, but operationally this turns the service
  # into a redirect-laundering surface for phishing. Curate a comma-
  # separated list (e.g. "bit.ly,tinyurl.com,known-phishing-domain.tld")
  # or wire in Safe Browsing / abuse-list lookups at the API layer before
  # going public.
  urlBlocklist: ""
  # Comma-separated origins the observer's WebSocket upgrader trusts. The
  # showcase page is not deployed in-cluster, so the default is empty
  # (no /stream clients accepted).
  observerAllowedOrigins: ""

# KEDA worker autoscaler. KEDA itself is installed separately (not by this
# chart); see deploy/k8s/README.md.
keda:
  enabled: true
  worker:
    minReplicas: 2
    maxReplicas: 12
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 30           # scale up when pending > N per replica
    queues:
      - shorten
      - webhook

# SSRF egress NetworkPolicy for the worker pods. Requires a CNI that enforces
# NetworkPolicy (Calico, Cilium). The default Calico-on-kind setup works.
networkPolicy:
  enabled: true
  # Selectors for the out-of-chart redis / minio Pods the worker needs to
  # reach. Bare `app: redis` would match every redis Pod sharing the
  # namespace; if you run more than one (multi-tenant cluster, blue/green),
  # tighten this to your specific instance label, e.g.
  #   redisSelector:
  #     app: redis
  #     app.kubernetes.io/instance: shortlink-redis
  redisSelector:
    app: redis
  minioSelector:
    app: minio
