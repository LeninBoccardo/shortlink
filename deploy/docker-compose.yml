# ShortLink — local infrastructure.
# Built up across milestones (SPEC §13). Milestone 2: Postgres + MinIO + Redis.
# Prometheus/Grafana arrive in M7; PgBouncer in M8.
#
# Usage:  docker compose -f deploy/docker-compose.yml up -d   (or: make dev)
name: shortlink

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortlink
      POSTGRES_PASSWORD: shortlink
      POSTGRES_DB: shortlink
    ports:
      # Host port 55432 (not 5432) avoids colliding with a native Postgres
      # install. The container still listens on 5432 internally.
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlink -d shortlink"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    # No persistence needed locally (SPEC §13); asynq tolerates a cold Redis.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  minio-data:
