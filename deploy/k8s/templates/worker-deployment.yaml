apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shortlink.componentName" (dict "root" . "component" "worker") }}
  labels:
    {{- include "shortlink.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
spec:
  # KEDA owns this number after install (min/max from values.keda.worker). The
  # static value here is just the bootstrap floor before the ScaledObject takes
  # effect; if KEDA is disabled the chart degrades to a fixed replica count.
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "shortlink.componentLabels" (dict "root" . "component" "worker") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      # Worker drain (asynq Shutdown + sweeper exit) needs DRAIN_TIMEOUT plus
      # a small buffer for in-flight HTTP webhook deliveries to finish.
      terminationGracePeriodSeconds: 60
      securityContext:
        {{- include "shortlink.podSecurityContext" . | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "shortlink.image" (dict "Values" .Values "name" "worker") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "shortlink.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "shortlink.componentName" (dict "root" . "component" "config") }}
            - secretRef:
                name: {{ include "shortlink.componentName" (dict "root" . "component" "secrets") }}
          env:
            - name: WORKER_PORT
              value: "8081"
            # POD_ID seeds the pod:{POD_ID}:alive heartbeat key the observer
            # uses to count live workers (SPEC §4.3). Downward API gives us a
            # stable, unique value per replica.
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
