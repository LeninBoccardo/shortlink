# ShortLink — local infrastructure.
# Built up across milestones (SPEC §13). Milestone 2: Postgres + MinIO + Redis.
# Milestone 7 adds Prometheus + Grafana. PgBouncer arrives in M8.
#
# Usage:  docker compose -f deploy/docker-compose.yml up -d   (or: make dev)
name: shortlink

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortlink
      POSTGRES_PASSWORD: shortlink
      POSTGRES_DB: shortlink
    ports:
      # Host port 55432 (not 5432) avoids colliding with a native Postgres
      # install. The container still listens on 5432 internally.
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlink -d shortlink"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    # No persistence needed locally (SPEC §13); asynq tolerates a cold Redis.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2h
      - --web.enable-lifecycle
    ports:
      # Host port 9091 (not 9090) avoids colliding with the observer on the
      # host (api/worker/observer run on the host during local dev). Inside
      # compose Prometheus still listens on 9090; Grafana reaches it as
      # http://prometheus:9090.
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Lets Prometheus reach api/worker/observer that run on the dev host.
      # Native on Docker Desktop; needed for Linux.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_DEFAULT_THEME: dark
      # Override Grafana's admin/admin default. Anyone copying this compose
      # file into a less-local environment shouldn't ship the canonical
      # password. Override locally with `GRAFANA_ADMIN_PASSWORD=... make dev`.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-shortlink-local-dev}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  minio-data:
  prometheus-data:
  grafana-data:
