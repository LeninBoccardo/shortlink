# ShortLink — local infrastructure.
# Built up across milestones (SPEC §13). Milestone 2: Postgres + MinIO + Redis.
# Milestone 7 adds Prometheus + Grafana. Milestone 8 adds PgBouncer and the
# one-shot migrate service.
#
# Usage:  docker compose -f deploy/docker-compose.yml up -d   (or: make dev)
name: shortlink

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortlink
      POSTGRES_PASSWORD: shortlink
      POSTGRES_DB: shortlink
    ports:
      # Host port 55432 (not 5432) avoids colliding with a native Postgres
      # install. The container still listens on 5432 internally.
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlink -d shortlink"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Expose /minio/v2/metrics/* without a bearer token. Acceptable for the
      # local stack (bound to localhost); production must use the default
      # `jwt` mode and generate a token via `mc admin prometheus generate`.
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    # No persistence needed locally (SPEC §13); asynq tolerates a cold Redis.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-exporter:
    # Prometheus exporter for Redis (memory, ops/sec, evicted keys, connected
    # clients). Powers the redis-resources dashboard and the Phase 3 scaling
    # panel widgets. Scraped by Prometheus at redis-exporter:9121.
    image: oliver006/redis_exporter:v1.66.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  postgres-exporter:
    # Prometheus exporter for Postgres (connections, tup_returned/inserted,
    # bgwriter stats, table sizes). Powers the postgres-resources dashboard
    # and the Phase 3 scaling panel widgets. Scraped at postgres-exporter:9187.
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://shortlink:shortlink@postgres:5432/shortlink?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  pgbouncer:
    # Transaction-pooling proxy in front of Postgres (SPEC §6, §12). In k8s
    # this carries the entire pod fleet's traffic on a bounded upstream pool;
    # locally it exists so the compose topology mirrors prod. Apps target
    # pgbouncer:6432 inside the compose network and host 16432 from the host.
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: shortlink
      DB_PASSWORD: shortlink
      DB_NAME: shortlink
      LISTEN_PORT: 6432
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 4
      RESERVE_POOL_SIZE: 4
      # Required for transaction-mode pooling: prepared statements would
      # otherwise leak between transactions. pgx uses QueryExecModeExec.
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - "16432:6432"
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    # One-shot service that applies goose migrations and exits 0. Use the
    # same image the cmd/migrate binary builds to in k8s so locally and in
    # prod we run the exact same migration runner. `restart: no` so a
    # successful exit is terminal -- compose won't loop it.
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BINARY: migrate
    image: shortlink-migrate:dev
    command: ["up"]
    environment:
      DATABASE_URL: postgres://shortlink:shortlink@postgres:5432/shortlink?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: ["migrate"]

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2h
      - --web.enable-lifecycle
    ports:
      # Host port 9091 (not 9090) avoids colliding with the observer on the
      # host (api/worker/observer run on the host during local dev). Inside
      # compose Prometheus still listens on 9090; Grafana reaches it as
      # http://prometheus:9090.
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Lets Prometheus reach api/worker/observer that run on the dev host.
      # Native on Docker Desktop; needed for Linux.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_DEFAULT_THEME: dark
      # Override Grafana's admin/admin default. Anyone copying this compose
      # file into a less-local environment shouldn't ship the canonical
      # password. Override locally with `GRAFANA_ADMIN_PASSWORD=... make dev`.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-shortlink-local-dev}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  minio-data:
  prometheus-data:
  grafana-data:
