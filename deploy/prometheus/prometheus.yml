# Prometheus scrape config for the ShortLink local stack (SPEC §13).
# api/worker/observer run on the host during local dev (make run-*), so
# Prometheus reaches them via host.docker.internal (mapped to host-gateway
# in docker-compose.yml). In Kubernetes (M8) these become pod targets.
global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: api

  - job_name: worker
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          service: worker

  - job_name: observer
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          service: observer

  # Phase 1 infra exporters. These all run inside the compose network so
  # Prometheus reaches them by service name, not host.docker.internal.

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: minio
    # MinIO exposes /minio/v2/metrics/cluster (cluster-level: disk usage,
    # bucket usage, request counts). MINIO_PROMETHEUS_AUTH_TYPE=public in
    # compose makes this scrape-able without a bearer token (local only).
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
        labels:
          service: minio
