apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shortlink.componentName" (dict "root" . "component" "secrets") }}
  labels:
    {{- include "shortlink.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "shortlink.databaseURL" . | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | quote }}
  OBSERVER_INGEST_TOKEN: {{ required "secrets.observerIngestToken must be set: empty token would leave POST /ingest open to any in-cluster client" .Values.secrets.observerIngestToken | quote }}
  # PgBouncer reads this via secretKeyRef rather than envFrom, so it stays
  # out of the application pods' env. Same value as the postgres password.
  PGBOUNCER_DB_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
